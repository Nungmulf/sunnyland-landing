<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sunnyland · After-school cu suflet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-bg: #FFF8E7;
      --c-bg-alt: #FFEFC9;
      --c-primary: #FFCB45;
      --c-secondary: #7BC9A8;
      --c-secondary-deep: #4A9D7C;
      --c-accent: #FF8A3D;
      --c-text: #3D2E1F;
      --c-text-soft: #6B5A48;
      --c-text-muted: #9A8A75;
      --c-white: #FFFFFF;
      --c-border: #EDE3CA;
      --f-display: "Fraunces", "Georgia", serif;
      --f-body: "Plus Jakarta Sans", system-ui, sans-serif;
      --r-sm: 10px;
      --r-md: 16px;
      --r-lg: 24px;
      --r-xl: 32px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--f-body);
      color: var(--c-text);
      background: var(--c-bg);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    img { max-width: 100%; display: block; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    a { color: inherit; text-decoration: none; }

    h1, h2, h3, h4 {
      font-family: var(--f-display);
      font-weight: 600;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--c-text);
    }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .section { padding: 96px 0; }

    @media (max-width: 768px) {
      .section { padding: 64px 0; }
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 28px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--c-accent);
      color: white;
      box-shadow: 0 6px 0 #C25E1E, 0 12px 24px rgba(255, 138, 61, 0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #C25E1E, 0 16px 28px rgba(255, 138, 61, 0.4); }
    .btn-primary:active { transform: translateY(2px); box-shadow: 0 2px 0 #C25E1E, 0 4px 12px rgba(255, 138, 61, 0.3); }

    .btn-secondary {
      background: white;
      color: var(--c-text);
      border: 2px solid var(--c-text);
      box-shadow: 0 4px 0 var(--c-text);
    }
    .btn-secondary:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--c-text); }

    .btn-ghost {
      color: var(--c-text);
      font-weight: 700;
      padding: 14px 20px;
    }
    .btn-ghost:hover { color: var(--c-accent); }

    /* Eyebrow */
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--c-secondary);
      color: white;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 999px;
      transform: rotate(-1.5deg);
    }
    .eyebrow.yellow { background: var(--c-primary); color: var(--c-text); }
    .eyebrow.orange { background: var(--c-accent); color: white; }

    .section-title {
      font-size: clamp(36px, 5vw, 56px);
      margin: 16px 0 12px;
      max-width: 720px;
    }
    .section-lede {
      font-size: 18px;
      color: var(--c-text-soft);
      max-width: 560px;
      text-wrap: pretty;
    }

    .section-head { margin-bottom: 56px; }
    .section-head.center { text-align: center; display: flex; flex-direction: column; align-items: center; }
    .section-head.center .section-title,
    .section-head.center .section-lede { margin-left: auto; margin-right: auto; }

    /* Squiggle */
    .squiggle {
      position: relative;
      display: inline-block;
      white-space: nowrap;
    }
    .squiggle::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: -8px;
      height: 14px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 14' preserveAspectRatio='none'><path d='M0 8 Q 12.5 0 25 8 T 50 8 T 75 8 T 100 8' stroke='%23FFCB45' stroke-width='4' fill='none' stroke-linecap='round'/></svg>");
      background-repeat: no-repeat;
      background-size: 100% 100%;
    }
    .squiggle.orange::after {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 14' preserveAspectRatio='none'><path d='M0 8 Q 12.5 0 25 8 T 50 8 T 75 8 T 100 8' stroke='%23FF8A3D' stroke-width='4' fill='none' stroke-linecap='round'/></svg>");
    }

    /* Placeholder */
    .ph {
      background:
        repeating-linear-gradient(45deg, rgba(0,0,0,0.04) 0 8px, transparent 8px 16px),
        var(--ph-bg, #FFE3A3);
      border-radius: var(--r-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "JetBrains Mono", "Courier New", monospace;
      font-size: 12px;
      color: var(--c-text-soft);
      text-align: center;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }
    .ph.green { --ph-bg: #BCE0CC; }
    .ph.peach { --ph-bg: #FFD0AE; }
    .ph.cream { --ph-bg: #FFE3A3; }
    .ph.lilac { --ph-bg: #E0D0F0; }

    /* Card */
    .card {
      background: white;
      border-radius: var(--r-lg);
      padding: 32px;
      border: 1.5px solid var(--c-border);
    }
    .card-shadow { box-shadow: 0 8px 0 rgba(61, 46, 31, 0.06), 0 16px 40px rgba(61, 46, 31, 0.06); }

    /* Sticker */
    .sticker {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
      transform: rotate(-3deg);
      white-space: nowrap;
    }

    /* Nav responsive */
    @media (max-width: 880px) {
      .nav-desktop { display: none !important; }
      .nav-burger { display: flex !important; }
    }
    @media (min-width: 881px) {
      .nav-mobile-panel { display: none !important; }
    }
    @media (max-width: 520px) {
      header .btn-primary { display: none !important; }
    }

    /* Hero responsive */
    @media (max-width: 900px) {
      .hero-grid { grid-template-columns: 1fr !important; gap: 48px !important; }
      .hero-media { max-width: 420px; margin: 0 auto; }
    }
    @media (max-width: 640px) {
      .stats-strip { grid-template-columns: repeat(2, 1fr) !important; gap: 16px; }
      .stats-strip > div { border-left: none !important; border-top: 1px solid var(--c-border); padding-top: 16px !important; }
      .stats-strip > div:nth-child(-n+2) { border-top: none !important; padding-top: 0 !important; }
    }

    /* Despre responsive */
    @media (max-width: 900px) {
      .despre-grid { grid-template-columns: 1fr !important; gap: 80px !important; }
    }

    /* Timeline responsive */
    @media (max-width: 720px) {
      .timeline { grid-template-columns: repeat(2, 1fr) !important; gap: 20px !important; }
    }

    /* Gallery responsive */
    @media (max-width: 760px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .gallery-grid > div { grid-row: span 1 !important; grid-column: span 1 !important; }
    }

    /* Testimonials responsive */
    @media (max-width: 880px) {
      .testimonials-stack { grid-template-columns: 1fr !important; }
      .trust-strip { grid-template-columns: 1fr !important; text-align: center; }
    }

    /* Location responsive */
    @media (max-width: 880px) {
      .loc-grid { grid-template-columns: 1fr !important; gap: 56px !important; }
    }

    /* Contact responsive */
    @media (max-width: 880px) {
      .contact-grid { grid-template-columns: 1fr !important; }
    }

    /* Footer responsive */
    @media (max-width: 760px) {
      .footer-grid { grid-template-columns: 1fr 1fr !important; }
    }
    @media (max-width: 480px) {
      .footer-grid { grid-template-columns: 1fr !important; }
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { scrollbar-width: none; }

    /* Service switch */
    .service-switch-bar {
      position: sticky; top: 73px; z-index: 49;
      background: rgba(255,248,231,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1.5px solid var(--c-border);
      padding: 12px 0;
    }
    .service-switch {
      position: relative;
      display: inline-flex;
      background: var(--c-text);
      border-radius: 999px;
      padding: 4px;
    }
    .service-switch-thumb {
      position: absolute;
      top: 4px; bottom: 4px;
      border-radius: 999px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .service-switch button {
      position: relative; z-index: 1;
      padding: 10px 28px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      transition: color 0.25s ease;
      white-space: nowrap;
    }
    .service-switch button:hover { color: rgba(255,255,255,0.85); }
    .service-switch button.active { color: var(--c-text); }
    @media (max-width: 520px) {
      .service-switch button { padding: 8px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel">
    /* ── Logo ── */
    function Logo({ size = 48, showText = true }) {
      return (
        <a href="#top" style={{ display: "flex", alignItems: "center", gap: 12, fontFamily: "var(--f-display)", fontWeight: 700, fontSize: 22, color: "var(--c-text)" }}>
          <span style={{
            width: size, height: size, borderRadius: "50%",
            overflow: "hidden",
            boxShadow: "0 4px 0 rgba(61,46,31,0.15)",
            border: "3px solid #fff",
            display: "block", flexShrink: 0,
          }}>
            <img src="assets/logo.png" alt="Sunnyland logo" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
          </span>
          {showText && <span>Sunnyland</span>}
        </a>
      );
    }

    /* ── Nav ── */
    function Nav() {
      const [open, setOpen] = React.useState(false);
      const links = [
        { href: "#despre", label: "Despre" },
        { href: "#oferim", label: "Activități" },
        { href: "#galerie", label: "Galerie" },
        { href: "#parinti", label: "Părinți" },
        { href: "#faq", label: "FAQ" },
        { href: "#contact", label: "Contact" },
      ];
      return (
        <header style={{
          position: "sticky", top: 0, zIndex: 50,
          background: "rgba(255,248,231,0.85)",
          backdropFilter: "blur(12px)",
          borderBottom: "1.5px solid var(--c-border)",
        }}>
          <div className="container" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 24px" }}>
            <Logo />
            <nav style={{ display: "flex", alignItems: "center", gap: 4 }} className="nav-desktop">
              {links.map(l => (
                <a key={l.href} href={l.href} style={{
                  padding: "10px 14px", borderRadius: 999, fontWeight: 600, fontSize: 15,
                  color: "var(--c-text)", transition: "background 0.15s",
                }} onMouseEnter={e => e.currentTarget.style.background = "rgba(123,201,168,0.18)"}
                   onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                  {l.label}
                </a>
              ))}
            </nav>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <a href="#contact" className="btn btn-primary" style={{ padding: "12px 22px", fontSize: 15 }}>
                Contactează-ne →
              </a>
              <button className="nav-burger" onClick={() => setOpen(!open)} style={{
                display: "none", width: 44, height: 44, borderRadius: 12,
                background: "white", border: "1.5px solid var(--c-border)",
                alignItems: "center", justifyContent: "center",
              }}>
                <span style={{ fontSize: 22 }}>{open ? "✕" : "☰"}</span>
              </button>
            </div>
          </div>
          {open && (
            <div className="nav-mobile-panel" style={{ borderTop: "1.5px solid var(--c-border)", padding: "12px 24px 24px", background: "var(--c-bg)" }}>
              {links.map(l => (
                <a key={l.href} href={l.href} onClick={() => setOpen(false)} style={{
                  display: "block", padding: "14px 8px", fontWeight: 600, fontSize: 17,
                  borderBottom: "1px solid var(--c-border)",
                }}>{l.label}</a>
              ))}
            </div>
          )}
        </header>
      );
    }

    /* ── Hero ── */
    function HeroBlobs() {
      return (
        <svg viewBox="0 0 800 600" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", zIndex: 0 }} aria-hidden="true">
          <defs>
            <radialGradient id="sun" cx="50%" cy="50%">
              <stop offset="0%" stopColor="#FFE17A" />
              <stop offset="100%" stopColor="#FFCB45" />
            </radialGradient>
          </defs>
          <circle cx="680" cy="120" r="90" fill="url(#sun)" opacity="0.9" />
          <path d="M -50 480 Q 200 380 380 460 T 850 480 L 850 700 L -50 700 Z" fill="#7BC9A8" opacity="0.35" />
          <path d="M -50 540 Q 250 460 450 520 T 850 530 L 850 700 L -50 700 Z" fill="#7BC9A8" opacity="0.55" />
        </svg>
      );
    }

    function Hero() {
      return (
        <section id="top" style={{ position: "relative", overflow: "hidden", paddingBottom: 80 }}>
          <HeroBlobs />
          <div className="container" style={{ position: "relative", zIndex: 1, paddingTop: 60, paddingBottom: 40 }}>
            <div className="hero-grid" style={{
              display: "grid", gridTemplateColumns: "1.1fr 1fr", gap: 64, alignItems: "center",
            }}>
              <div>
                <span className="eyebrow orange">☀ After-school cu suflet</span>
                <h1 style={{
                  fontSize: "clamp(44px, 6.5vw, 80px)",
                  margin: "20px 0 24px",
                  lineHeight: 1,
                }}>
                  După școală, copilul tău intră într-un{" "}
                  <span className="squiggle orange" style={{ color: "var(--c-secondary-deep)" }}>univers</span>{" "}
                  al lui.
                </h1>
                <p style={{ fontSize: 20, color: "var(--c-text-soft)", maxWidth: 520, marginBottom: 36, textWrap: "pretty" }}>
                  La Sunnyland, copiii de 6–11 ani își fac temele, se joacă, fac teatru și sport — într-un loc care nu se simte ca școala, ci ca acasă.
                </p>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 14, marginBottom: 32 }}>
                  <a href="#contact" className="btn btn-primary">
                    Programează o vizită →
                  </a>
                  <a href="#oferim" className="btn btn-ghost">
                    Vezi ce facem într-o zi
                  </a>
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 28, color: "var(--c-text-soft)", fontSize: 15, fontWeight: 600 }}>
                  <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ color: "var(--c-secondary-deep)", fontSize: 20 }}>✓</span> Masă caldă + gustare incluse
                  </span>
                  <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ color: "var(--c-secondary-deep)", fontSize: 20 }}>✓</span> Teatru, sport & joacă liberă
                  </span>
                  <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ color: "var(--c-secondary-deep)", fontSize: 20 }}>✓</span> Program 12:00 – 18:00
                  </span>
                </div>
              </div>
              <div style={{ position: "relative" }} className="hero-media">
                <div className="ph cream" style={{
                  aspectRatio: "4/5", borderRadius: 28,
                  transform: "rotate(2deg)",
                  boxShadow: "0 12px 0 rgba(61,46,31,0.08), 0 30px 60px rgba(61,46,31,0.12)",
                  border: "6px solid white",
                }}>
                  [ photo: copil zâmbind cu rucsac ]
                </div>
                <div className="sticker" style={{
                  position: "absolute", top: -18, left: -22,
                  background: "var(--c-accent)", color: "white",
                  transform: "rotate(-8deg)", fontSize: 14,
                  boxShadow: "0 6px 20px rgba(255,138,61,0.4)",
                  padding: "10px 18px",
                }}>
                  🎭 Teatru & Sport
                </div>
                <div className="sticker" style={{
                  position: "absolute", bottom: 40, right: -28,
                  background: "white", color: "var(--c-text)",
                  transform: "rotate(5deg)", fontSize: 14,
                  border: "2px solid var(--c-text)",
                  boxShadow: "0 4px 0 var(--c-text)",
                  padding: "10px 18px",
                }}>
                  🍎 Prânz + gustare incluse
                </div>
                <div className="sticker" style={{
                  position: "absolute", top: "45%", left: -36,
                  background: "var(--c-secondary)", color: "white",
                  transform: "rotate(-4deg)", fontSize: 14,
                  boxShadow: "0 6px 20px rgba(123,201,168,0.4)",
                  padding: "10px 18px",
                }}>
                  🏡 Curte pentru joacă
                </div>
              </div>
            </div>
          </div>

          {/* Stats strip */}
          <div className="container" style={{ position: "relative", zIndex: 1, marginTop: 60 }}>
            <div className="stats-strip" style={{
              display: "grid", gridTemplateColumns: "repeat(4, 1fr)",
              background: "white", borderRadius: 24, padding: "28px 16px",
              border: "1.5px solid var(--c-border)",
              boxShadow: "0 8px 0 rgba(61,46,31,0.04), 0 20px 50px rgba(61,46,31,0.06)",
            }}>
              {[
                { n: "6–11 ani", l: "vârste acceptate" },
                { n: "10 copii", l: "o singură grupă, atenție maximă" },
                { n: "12–18", l: "program zilnic L–V" },
                { n: "110 lei/zi", l: "sau 1950 lei/lună" },
              ].map((s, i) => (
                <div key={i} style={{ textAlign: "center", padding: "8px 12px", borderLeft: i ? "1px solid var(--c-border)" : "none" }}>
                  <div style={{ fontFamily: "var(--f-display)", fontSize: "clamp(22px, 3vw, 32px)", fontWeight: 700, color: "var(--c-accent)" }}>{s.n}</div>
                  <div style={{ fontSize: 13, color: "var(--c-text-soft)", marginTop: 4 }}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* ── Despre ── */
    function Despre() {
      return (
        <section id="despre" className="section" style={{ background: "var(--c-bg)" }}>
          <div className="container">
            <div className="despre-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1.1fr", gap: 72, alignItems: "center" }}>
              <div style={{ position: "relative" }}>
                <div className="ph green" style={{
                  aspectRatio: "4/5", borderRadius: 28,
                  border: "6px solid white",
                  boxShadow: "0 12px 0 rgba(61,46,31,0.08), 0 30px 60px rgba(61,46,31,0.08)",
                }}>
                  [ photo: educator citind cu copii ]
                </div>
                <div className="ph peach" style={{
                  position: "absolute", bottom: -32, right: -32,
                  width: "55%", aspectRatio: "1/1", borderRadius: 24,
                  border: "6px solid white",
                  transform: "rotate(-3deg)",
                  boxShadow: "0 12px 30px rgba(61,46,31,0.12)",
                }}>
                  [ photo: experiment ]
                </div>
              </div>
              <div>
                <span className="eyebrow">Despre Sunnyland</span>
                <h2 className="section-title" style={{ marginTop: 16 }}>
                  Un loc unde copiii se simt{" "}
                  <span className="squiggle">acasă</span>.
                </h2>
                <p style={{ fontSize: 18, color: "var(--c-text-soft)", marginBottom: 20, textWrap: "pretty" }}>
                  Sunnyland s-a născut în 2025 din dorința de a crea copiilor un spațiu care nu se simte ca școala — un loc în care joaca, creativitatea și distracția sunt la ele acasă, iar copiii sunt principalii actori.
                </p>
                <p style={{ fontSize: 18, color: "var(--c-text-soft)", marginBottom: 32, textWrap: "pretty" }}>
                  Suntem o echipă mică și unită: două surori fondatoare, un animator de teatru și un profesor de sport. Lucrăm într-o singură grupă, ca fiecare copil să fie văzut și ascultat.
                </p>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 20 }}>
                  {[
                    { ic: "🏠", t: "Ca acasă, nu ca la școală", d: "Mediu familiar, relaxat, fără presiunea notelor." },
                    { ic: "🤝", t: "Echipă mică, grijă mare", d: "O singură grupă de 10 copii. Fiecare contează." },
                  ].map((v, i) => (
                    <div key={i} style={{ padding: "20px 22px", background: "white", borderRadius: 20, border: "1.5px solid var(--c-border)" }}>
                      <div style={{ fontSize: 28, marginBottom: 8 }}>{v.ic}</div>
                      <div style={{ fontFamily: "var(--f-display)", fontSize: 18, fontWeight: 700, marginBottom: 4 }}>{v.t}</div>
                      <div style={{ fontSize: 14, color: "var(--c-text-soft)" }}>{v.d}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ── Oferim ── */
    function Oferim() {
      const items = [

                  className={active === opt.id ? "active" : ""}

    function PetreceriPachete() {

          features: ["2 ore de distracție", "1 animator", "Candy bar simplu", "Decor baloane", "Muzică & jocuri", "Foto amintire grup"],
        },
        {
          name: "Super Party",
          price: "1800 lei",
          kids: "15–20 copii",
          color: "#E84C82",
          popular: true,
          features: ["3 ore de distracție", "2 animatori", "Candy bar premium", "Decor tematic la alegere", "Face painting", "Mini-disco", "Foto amintire + diplome", "Tort inclus"],
        },
        {
          name: "Mega Party",
          price: "2500 lei",
          kids: "20–25 copii",
          color: "#7B5DC9",
          features: ["4 ore de distracție", "3 animatori", "Candy bar deluxe", "Decor complet personalizat", "Face painting + baloane modelaj", "Spectacol magie / bubbles", "Foto + video amintire", "Tort premium inclus", "Invitații personalizate"],

        <section id="pachete" className="section" style={{ background: "var(--c-bg-alt)" }}>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 24, alignItems: "start" }}>

                <div key={i} className="card card-shadow" style={{
                  padding: "36px 32px",
                  borderTop: `6px solid ${p.color}`,
                  position: "relative",
                  transform: p.popular ? "scale(1.03)" : "none",
                }}>
                  {p.popular && (
                    <div className="sticker" style={{
                      position: "absolute", top: -16, right: 20,

                  )}

                  <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 28 }}>

                  <a href="#contact" className="btn btn-primary" style={{
                    width: "100%", justifyContent: "center",
                    background: p.color,

        </section>
      );
    }

    /* ── Petreceri FAQ ── */
    function PetreceriFaq() {
      const [open, setOpen] = React.useState(0);
      const qs = [
        { q: "Când pot organiza petrecerea?", a: "Sâmbătă și duminică, toată ziua, sau în timpul săptămânii după ora 17:00. Rezervă cu minim 2 săptămâni înainte." },
        { q: "Pot aduce tort propriu?", a: "Da, dar pachetele Super și Mega includ deja tortul. Dacă preferi tort propriu, facem o reducere." },
        { q: "Ce teme sunt disponibile?", a: "Prințese, supereroi, pirați, safari, spațiu cosmic, unicorni, Lego, știință nebună — sau orice altă temă la cerere." },
        { q: "Pot rămâne părinții?", a: "Absolut! Avem un spațiu separat cu cafea și gustări pentru adulți, sau puteți participa alături de copii." },
        { q: "Ce se întâmplă dacă plouă?", a: "Totul e în interior — sala noastră de 80mp e perfectă indiferent de vreme. Avem și curte pentru zilele frumoase." },
      ];
      return (
        <section className="section" style={{ background: "var(--c-bg)" }}>
          <div className="container" style={{ maxWidth: 880 }}>
            <div className="section-head center">
              <span className="eyebrow" style={{ background: "#7B5DC9" }}>Întrebări frecvente</span>
              <h2 className="section-title" style={{ marginTop: 16 }}>
                Despre petrecerile noastre
              </h2>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {qs.map((it, i) => {
                const isOpen = open === i;
                return (
                  <div key={i} style={{
                    background: isOpen ? "white" : "rgba(255,255,255,0.6)",
                    borderRadius: 20,
                    border: `1.5px solid ${isOpen ? "#E84C82" : "var(--c-border)"}`,
                    overflow: "hidden",
                    transition: "all 0.2s ease",
                  }}>
                    <button onClick={() => setOpen(isOpen ? -1 : i)} style={{
                      width: "100%", textAlign: "left",
                      padding: "22px 28px",
                      display: "flex", justifyContent: "space-between", alignItems: "center", gap: 16,
                      fontSize: 18, fontWeight: 600, color: "var(--c-text)",
                      fontFamily: "var(--f-body)",
                    }}>
                      <span>{it.q}</span>
                      <span style={{
                        width: 36, height: 36, flexShrink: 0,
                        borderRadius: "50%",
                        background: isOpen ? "#E84C82" : "var(--c-bg-alt)",
                        color: isOpen ? "white" : "var(--c-text)",
                        display: "grid", placeItems: "center",
                        fontSize: 22, fontWeight: 700,
                        transition: "all 0.2s ease",
                        transform: isOpen ? "rotate(45deg)" : "none",
                      }}>+</span>
                    </button>
                    {isOpen && (
                      <div style={{ padding: "0 28px 24px", color: "var(--c-text-soft)", fontSize: 16, lineHeight: 1.6, textWrap: "pretty" }}>
                        {it.a}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </section>
      );
    }

                <Parinti />
                <Faq />
                <Locatie />
                <Contact />
              </>

            {service === "summer" && (
              <>
                <SummerHero />
                <SummerOferim />
                <Galerie />
                <Parinti />
                <SummerFaq />
                <Locatie />
                <Contact />
              </>
            )}
            {service === "petreceri" && (
              <>

                <PetreceriFaq />
                <Locatie />
                <Contact />
              </>

          </main>
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
